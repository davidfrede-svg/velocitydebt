<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>David Frederickson | USA Wealth Builder</title>
  <meta name="description" content="State Licensed Underwriter — David Frederickson, USA Wealth Builder" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: linear-gradient(145deg, #1e293b, #0f172a);
      border: 1px solid #334155;
      border-radius: 24px;
      width: 100%;
      max-width: 420px;
      overflow: hidden;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    }
    .card-header {
      background: linear-gradient(135deg, #1d4ed8, #1e3a8a);
      padding: 40px 32px 52px;
      text-align: center;
      position: relative;
    }
    .card-header::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0; right: 0;
      height: 40px;
      background: #1e293b;
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
    }
    .photo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      object-position: top;
      border: 4px solid rgba(255,255,255,0.25);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      margin-bottom: 16px;
    }
    .name {
      color: #fff;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }
    .title {
      color: #93c5fd;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }
    .card-body {
      padding: 28px 32px 32px;
    }
    .divider {
      border: none;
      border-top: 1px solid #334155;
      margin: 0 0 24px;
    }
    .contact-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 28px;
    }
    .contact-item {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: inherit;
    }
    .contact-item:hover .contact-text { color: #60a5fa; }
    .icon-wrap {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: rgba(29,78,216,0.3);
      border: 1px solid rgba(96,165,250,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .icon-wrap svg { width: 20px; height: 20px; }
    .contact-label {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }
    .contact-text {
      color: #e2e8f0;
      font-size: 15px;
      font-weight: 500;
      transition: color 0.2s;
    }
    .btn-add {
      display: block;
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.3px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(29,78,216,0.4);
    }
    .btn-add:hover {
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      box-shadow: 0 6px 24px rgba(37,99,235,0.5);
      transform: translateY(-1px);
    }
    .btn-add:active { transform: translateY(0); }
    .footer {
      text-align: center;
      padding: 16px 0 0;
      color: #475569;
      font-size: 12px;
    }
    .footer a { color: #60a5fa; text-decoration: none; }
  </style>
</head>
