<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>County Sales Map</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #0a1a0a;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #e0e0e0;
  }

  /* Full-screen map SVG */
  #map-svg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: block;
  }

  .county-path {
    stroke: #0a1a0a;
    stroke-width: 0.25;
    cursor: pointer;
  }
  .county-path:hover { stroke: #fff; stroke-width: 1.2; opacity: 0.9; }

  .state-border {
    fill: none;
    stroke: rgba(255,255,255,0.4);
    stroke-width: 0.7;
    pointer-events: none;
  }

  /* ── Thin header bar ── */
  #header {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 32px;
    background: rgba(5, 15, 5, 0.85);
    backdrop-filter: blur(4px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    padding: 0 10px;
    gap: 10px;
    z-index: 10;
  }
  #header h1 {
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    white-space: nowrap;
    letter-spacing: 0.5px;
  }
  .pill {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 2px 8px;
    font-size: 10px;
    color: #b0d0b0;
    white-space: nowrap;
  }
  .pill b { color: #ffd700; }
  #live {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    color: #4caf50;
  }
  #live .dot {
    width: 6px; height: 6px;
    background: #4caf50;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.3; transform:scale(1.5); }
  }

  /* ── Top-20 overlay panel ── */
  #panel {
    position: absolute;
    top: 40px;
    left: 8px;
    width: 175px;
    max-height: calc(100% - 52px);
    background: rgba(5, 18, 5, 0.88);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    z-index: 10;
  }
  #panel-title {
    padding: 7px 10px 5px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: #7db87d;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
  }
  #county-list {
    overflow-y: auto;
    flex: 1;
  }
  #county-list::-webkit-scrollbar { width: 3px; }
  #county-list::-webkit-scrollbar-thumb { background: #2a5a2a; border-radius: 2px; }

  .cr {
    padding: 5px 8px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    cursor: pointer;
    transition: background 0.12s;
  }
  .cr:hover { background: rgba(255,255,255,0.07); }
  .cr.sel { background: rgba(255,215,0,0.1); border-left: 2px solid #ffd700; }
  .cr-top { display: flex; align-items: baseline; gap: 4px; }
  .cr-rank { font-size: 9px; color: #4a7a4a; }
  .cr-name { font-size: 11px; font-weight: 600; color: #d0f0d0; }
  .cr-sub { font-size: 10px; color: #5a8a5a; margin-top: 1px; }
  .cr-bar { height: 2px; background: rgba(255,255,255,0.07); border-radius: 1px; margin-top: 3px; }
  .cr-fill { height: 2px; background: linear-gradient(90deg,#4caf50,#ffd700); border-radius: 1px; }

  /* ── Contact detail panel ── */
  #detail {
    display: none;
    padding: 7px 8px;
    background: rgba(0,10,0,0.6);
    border-top: 1px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
    max-height: 120px;
  }
  #detail.show { display: block; }
  #detail-title { font-size: 10px; font-weight: 700; color: #ffd700; margin-bottom: 3px; }
  #detail-list { font-size: 10px; color: #7aaa7a; line-height: 1.7; overflow-y: auto; max-height: 90px; }

  /* ── Legend ── */
  #legend {
    position: absolute;
    bottom: 8px;
    right: 8px;
    background: rgba(5,15,5,0.85);
    backdrop-filter: blur(4px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    padding: 6px 9px;
    font-size: 10px;
    z-index: 10;
  }
  #legend .lt {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: #5a8a5a;
    margin-bottom: 4px;
  }
  .lr { display: flex; align-items: center; gap: 5px; margin-bottom: 2px; }
  .ls { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .ll { color: #8aaa8a; }

  /* ── Tooltip ── */
  #tip {
    position: absolute;
    background: rgba(5,20,5,0.95);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    padding: 6px 10px;
    pointer-events: none;
    font-size: 11px;
    display: none;
    z-index: 20;
    max-width: 180px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.6);
  }
  #tip-name { font-weight: 700; color: #fff; margin-bottom: 2px; }
  #tip-count { color: #ffd700; font-weight: 700; }

  /* ── Loading ── */
  #loading {
    position: absolute;
    inset: 0;
    background: rgba(5,15,5,0.9);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 30;
  }
  #loading.gone { display: none; }
  .spin {
    width: 32px; height: 32px;
    border: 3px solid #1a3a1a;
    border-top-color: #4caf50;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  #load-msg { color: #5a9a5a; font-size: 12px; text-align: center; line-height: 1.5; }
</style>
</head>
<body>

<svg id="map-svg"></svg>

<div id="header">
  <h1>County Sales Map</h1>
  <div class="pill">Sold: <b id="s-total">—</b></div>
  <div class="pill">Counties: <b id="s-counties">—</b></div>
  <div class="pill">Updated: <b id="s-updated">—</b></div>
  <div id="live"><div class="dot"></div>LIVE</div>
</div>

<div id="panel">
  <div id="panel-title">Top 20 Counties</div>
  <div id="county-list"></div>
  <div id="detail">
    <div id="detail-title"></div>
    <div id="detail-list"></div>
  </div>
</div>

<div id="legend">
  <div class="lt">Sales</div>
  <div class="lr"><div class="ls" style="background:#1a4d1a"></div><div class="ll">0</div></div>
  <div class="lr"><div class="ls" style="background:#16213e"></div><div class="ll">1–2</div></div>
  <div class="lr"><div class="ls" style="background:#0f3460"></div><div class="ll">3–5</div></div>
  <div class="lr"><div class="ls" style="background:#e94560"></div><div class="ll">6–10</div></div>
  <div class="lr"><div class="ls" style="background:#ff6b35"></div><div class="ll">11–20</div></div>
  <div class="lr"><div class="ls" style="background:#ffd700"></div><div class="ll">21+</div></div>
</div>

<div id="tip">
  <div id="tip-name"></div>
  <div id="tip-count"></div>
</div>

<div id="loading">
  <div class="spin"></div>
  <div id="load-msg">Loading live sales data…<br><small style="color:#3a6a3a;font-size:10px">First load may take ~60 seconds</small></div>
</div>

<script>
const STATE_FIPS = {
  "01":"AL","02":"AK","04":"AZ","05":"AR","06":"CA","08":"CO","09":"CT",
  "10":"DE","11":"DC","12":"FL","13":"GA","15":"HI","16":"ID","17":"IL",
  "18":"IN","19":"IA","20":"KS","21":"KY","22":"LA","23":"ME","24":"MD",
  "25":"MA","26":"MI","27":"MN","28":"MS","29":"MO","30":"MT","31":"NE",
  "32":"NV","33":"NH","34":"NJ","35":"NM","36":"NY","37":"NC","38":"ND",
  "39":"OH","40":"OK","41":"OR","42":"PA","44":"RI","45":"SC","46":"SD",
  "47":"TN","48":"TX","49":"UT","50":"VT","51":"VA","53":"WA","54":"WV",
  "55":"WI","56":"WY"
};

function countyColor(n) {
  if (!n) return '#1a4d1a';
  if (n <= 2)  return '#16213e';
  if (n <= 5)  return '#0f3460';
  if (n <= 10) return '#e94560';
  if (n <= 20) return '#ff6b35';
  return '#ffd700';
}

let topo = null, salesIdx = {}, selRow = null;

function getKey(f) {
  const sf = String(f.id).padStart(5,'0').slice(0,2);
  return (f.properties.name||'').toLowerCase() + '|' + (STATE_FIPS[sf]||'').toLowerCase();
}

async function fetchData() {
  const r = await fetch('/api/county-map');
  if (!r.ok) throw new Error('API ' + r.status);
  const j = await r.json();
  if (j.loading) {
    document.getElementById('load-msg').innerHTML = 'Server gathering GHL data…<br><small style="color:#3a6a3a;font-size:10px">Retrying in 10s</small>';
    setTimeout(fetchData, 10000);
    return null;
  }
  document.getElementById('s-total').textContent = (j.total||0).toLocaleString();
  document.getElementById('s-counties').textContent = (j.counties||[]).length;
  if (j.lastUpdated) {
    const d = new Date(j.lastUpdated);
    document.getElementById('s-updated').textContent = d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  }
  return j.counties || [];
}

function buildIdx(counties) {
  const idx = {};
  for (const c of counties) idx[c.county.toLowerCase()+'|'+c.state.toLowerCase()] = c;
  return idx;
}

function renderPanel(counties) {
  const list = document.getElementById('county-list');
  list.innerHTML = '';
  const top = counties.slice(0,20);
  const max = top[0]?.count || 1;
  top.forEach((c,i) => {
    const d = document.createElement('div');
    d.className = 'cr';
    d.dataset.key = c.county.toLowerCase()+'|'+c.state.toLowerCase();
    d.innerHTML = `<div class="cr-top"><span class="cr-rank">#${i+1}</span><span class="cr-name">${c.county}</span></div>
      <div class="cr-sub">${c.state} &bull; ${c.count} sold</div>
      <div class="cr-bar"><div class="cr-fill" style="width:${Math.round(c.count/max*100)}%"></div></div>`;
    d.addEventListener('click', () => selectCounty(c, d));
    list.appendChild(d);
  });
}

function selectCounty(c, row) {
  document.querySelectorAll('.cr.sel').forEach(e => e.classList.remove('sel'));
  const det = document.getElementById('detail');
  if (selRow === row) { selRow = null; det.classList.remove('show'); return; }
  selRow = row;
  row.classList.add('sel');
  document.getElementById('detail-title').textContent = `${c.county}, ${c.state} — ${c.count} sold`;
  document.getElementById('detail-list').innerHTML = (c.contacts||[]).map(n=>`• ${n}`).join('<br>') || '<span style="color:#3a5a3a">No names</span>';
  det.classList.add('show');
}

function renderMap(usGeo, idx) {
  const svg = d3.select('#map-svg');
  svg.selectAll('*').remove();
  const W = window.innerWidth, H = window.innerHeight;
  svg.attr('width', W).attr('height', H);

  const proj = d3.geoAlbersUsa().fitSize([W, H],
    topojson.feature(usGeo, usGeo.objects.counties));
  const path = d3.geoPath().projection(proj);
  const g = svg.append('g');

  g.selectAll('.county-path')
    .data(topojson.feature(usGeo, usGeo.objects.counties).features)
    .join('path')
    .attr('class','county-path')
    .attr('d', path)
    .attr('fill', d => { const e = idx[getKey(d)]; return countyColor(e?.count); })
    .on('mousemove', (ev,d) => {
      const e = idx[getKey(d)];
      const sf = String(d.id).padStart(5,'0').slice(0,2);
      document.getElementById('tip-name').textContent = `${d.properties.name}, ${STATE_FIPS[sf]||'?'}`;
      document.getElementById('tip-count').textContent = e ? e.count+' sold' : 'No sales';
      const tip = document.getElementById('tip');
      tip.style.display = 'block';
      let x = ev.clientX+14, y = ev.clientY-12;
      if (x+190 > W) x = ev.clientX-195;
      if (y+60 > H)  y = ev.clientY-65;
      tip.style.left = x+'px'; tip.style.top = y+'px';
    })
    .on('mouseleave', () => { document.getElementById('tip').style.display='none'; })
    .on('click', (ev,d) => {
      const key = getKey(d);
      const e = idx[key];
      if (!e) return;
      const row = document.querySelector(`.cr[data-key="${key}"]`);
      if (row) { selectCounty(e, row); row.scrollIntoView({block:'nearest'}); }
    });

  g.append('path')
    .datum(topojson.mesh(usGeo, usGeo.objects.states, (a,b)=>a!==b))
    .attr('class','state-border')
    .attr('d', path);
}

async function init() {
  try {
    const [usGeo, counties] = await Promise.all([
      fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json').then(r=>r.json()),
      fetchData()
    ]);
    if (!counties) return;
    topo = usGeo;
    salesIdx = buildIdx(counties);
    document.getElementById('loading').classList.add('gone');
    renderPanel(counties);
    renderMap(usGeo, salesIdx);
  } catch(err) {
    document.getElementById('load-msg').textContent = 'Error: '+err.message;
  }
}

async function refresh() {
  try {
    const counties = await fetchData();
    if (!counties || !topo) return;
    salesIdx = buildIdx(counties);
    renderPanel(counties);
    renderMap(topo, salesIdx);
  } catch(e) {}
}

// Redraw on any resize (works in iframes)
let rt;
new ResizeObserver(() => {
  clearTimeout(rt);
  rt = setTimeout(() => { if (topo && Object.keys(salesIdx).length) renderMap(topo, salesIdx); }, 100);
}).observe(document.body);

init();
setInterval(refresh, 15*60*1000);
</script>
</body>
</html>
